[pytest]
# The HOS engine and the service wrappers are pure Python with no Django
# dependency. The API tests do need Django, so settings are configured here --
# but the engine and services are still importable without it (proven separately
# by hard-blocking the django import).
DJANGO_SETTINGS_MODULE = config.settings
testpaths = tests
pythonpath = .

# Live tests hit real third-party APIs and need an ORS key, so they are excluded
# by default. Run them deliberately with: pytest -m live
addopts = -m "not live"
markers =
    live: hits real Nominatim/OpenRouteService endpoints; needs ORS_API_KEY
